url: https://themis.tidymodels.org

template:
  package: tidytemplate
  bootstrap: 5
  bslib:
    primary: "#CA225E"
  includes:
    in_header: |
      <script src="https://cdn.jsdelivr.net/gh/posit-dev/supported-by-posit/js/badge.min.js" data-max-height="43" data-light-bg="#666f76" data-light-fg="#f9f9f9"></script>
      <!-- Privacy-friendly analytics by Plausible -->
      <script async src="https://plausible.io/js/pa-iRPZwdy8p-n7xYPq_6hNJ.js"></script>
      <script>
        window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
        plausible.init()
      </script>
development:
  mode: auto

articles:
- title: Getting started
  navbar: ~
  contents:
  - articles/ratio

reference:
- title: Over-sampling
  desc: >
    **Over-sampling** is the act of synthetically generating observations for
    the minority classes. This is done either by random sampling or using
    more advanced methods.
  contents:
  - step_upsample
  - step_smote
  - step_smotenc
  - step_bsmote
  - step_adasyn
  - step_rose
- title: Under-sampling
  desc: >
    **Under-sampling** is the act of removing observations from the majority
    classes.
  contents:
  - step_downsample
  - step_nearmiss
  - step_tomek
- title: Methods
  desc: >
    Some of the methods implemented in this package as steps are also
    available as their own functions.
  contents:
  - smote
  - smotenc
  - bsmote
  - adasyn
  - rose
  - nearmiss
  - tomek
- title: Datasets
  contents:
  - circle_example
